<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem no fundo</title>
<style>
    body{
        background-image: url("../img/wallpaper002.jpg");
    }
    main{
        width: 900px;
        height: 500px;
        background-image: linear-gradient(to top, skyblue, black, red, pink, green, gray, yellow, blue, white, purple );
        margin: auto;
        margin-top: 70px;
    }
    div{
        display: inline-block;
        font-size: 3em;
        text-align: center;
        line-height: 200px;
        width: 200px;
        height: 200px;
        border: 1px solid black;
        margin-top: 150px;
    }
    #d1{
        background-color: greenyellow;
    }
    #d2{
        background-image: radial-gradient(white, blue, yellow, black, pink, green, gray, violet, orange, silver, brown);
    }
    #d3{
        background-image: url("../img/wallpaper001.jpg");
    }
</style>
</head>
<body>
    <main>
        <div id="d1" >1</div>
        <div id="d2" >2</div>
        <div id="d3" >3</div>
    </main>
</body>
</html>
